---
# BookBoss with PostgreSQL (recommended)
#
# Usage:
#   docker compose -f docker-compose-postgres.yaml up -d
#
# Prerequisites:
#   mkdir -p Library/Books Library/Bookdrop
#
# See the user manual for full configuration details:
#   https://szinn.github.io/BookBoss/user/configuration.html

services:
  db:
    image: postgres:17@sha256:b994732fcf33f73776c65d3a5bf1f80c00120ba5007e8ab90307b1a743c1fc16
    environment:
      POSTGRES_USER: bookboss
      POSTGRES_PASSWORD: bookboss
      POSTGRES_DB: bookboss
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookboss"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bookboss:
    image: ghcr.io/szinn/bookboss:latest@sha256:c2fa84b39d6b2e9018e5533af8737863a4d644d97ed0f6f8ff3ce26d2f2d120f
    ports:
      - "8080:8080" # Web UI
      - "8081:8081" # gRPC API
    volumes:
      - ./Library/Books:/library/books
      - ./Library/Bookdrop:/library/bookdrop
    environment:
      # ── Required ─────────────────────────────────────────────
      # Database connection string
      BOOKBOSS__DATABASE__DATABASE_URL: "postgresql://bookboss:bookboss@db:5432/bookboss"
      # Absolute path inside container where imported books are stored
      BOOKBOSS__LIBRARY__LIBRARY_PATH: "/library/books"
      # Absolute path inside container where new files are dropped for import
      BOOKBOSS__IMPORT__BOOKDROP_PATH: "/library/bookdrop"
      # Encryption key for OPDS/device sync tokens — change this to a random string
      BOOKBOSS__ENCRYPTION_SECRET: "change-me-to-a-random-secret"

      # ── Optional: Networking ─────────────────────────────────
      # IP address for the web server (default: 0.0.0.0)
      # BOOKBOSS__FRONTEND__LISTEN_IP: "0.0.0.0"
      # Port for the web server (default: 8080)
      # BOOKBOSS__FRONTEND__LISTEN_PORT: "8080"
      # External URL where users access BookBoss — used for OPDS and device sync
      # (default: http://0.0.0.0:8080)
      BOOKBOSS__FRONTEND__BASE_URL: "http://localhost:8080"
      # IP address for the gRPC API (default: 0.0.0.0)
      # BOOKBOSS__API__GRPC_LISTEN_IP: "0.0.0.0"
      # Port for the gRPC API (default: 8081)
      # BOOKBOSS__API__GRPC_LISTEN_PORT: "8081"

      # ── Optional: Import Scanner ─────────────────────────────
      # Seconds between bookdrop scans (default: 60)
      # BOOKBOSS__IMPORT__SCAN_INTERVAL_SECS: "60"
      # Seconds between import worker polls (default: 5)
      # BOOKBOSS__IMPORT__WORKER_POLL_INTERVAL_SECS: "5"

      # ── Optional: Metadata Providers ─────────────────────────
      # Hardcover API token — enables richer metadata enrichment
      # BOOKBOSS__METADATA__HARDCOVER_API_TOKEN: ""
      # Google Books API token — secondary metadata source
      # BOOKBOSS__METADATA__GOOGLEBOOKS_API_TOKEN: ""

      # ── Optional: Logging ────────────────────────────────────
      # Log level (default: info). Examples: debug, warn, bookboss=debug
      # RUST_LOG: "info"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
